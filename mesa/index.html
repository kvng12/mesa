<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>Chowli — Your Local Food Market</title>
    <meta name="description" content="Find restaurants near you, browse live menus, and get real-time updates. No delivery middleman." />
    <meta name="theme-color" content="#FF4B4B" />

    <!-- PWA — Android -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA — iOS (Safari doesn't use the manifest for these) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chowli" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS splash screens (generates safe area on notched phones) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
